<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPro - Cryptocurrency Platform (React + Bootstrap)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS (only grid & utilities) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --black: #000000;
            --dark: #111827;
            --gray-dark: #374151;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --light: #f9fafb;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }
        /* Header */
        .app-header {
            background-color: var(--black);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }
        .logo {
            display: flex;
            align-items: center;
            font-weight: 800;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            user-select: none;
        }
        .logo i {
            margin-right: 10px;
            color: var(--primary-light);
        }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links li {
            margin-left: 30px;
        }
        .nav-links li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: color 0.3s;
            opacity: 0.9;
            cursor: pointer;
        }
        .nav-links li a:hover {
            color: var(--primary-light);
            opacity: 1;
        }
        .header-buttons {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.95rem;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
        }
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
        .btn-outline-dark {
            background-color: transparent;
            color: var(--black);
            border: 1px solid var(--gray);
        }
        .btn-outline-dark:hover {
            background-color: rgba(0, 0, 0, 0.05);
            border-color: var(--dark);
        }
        /* Hero */
        .hero {
            padding: 100px 0;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(30, 64, 175, 0.1));
        }
        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }
        .hero-text {
            flex: 1;
            max-width: 600px;
        }
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        .hero-image img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
        }
        .hero h1 {
            font-size: 3.2rem;
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 800;
        }
        .hero .subtitle {
            font-size: 1.2rem;
            color: var(--gray-light);
            margin-bottom: 30px;
            opacity: 0.9;
        }
        /* Section Title */
        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }
        .section-title h2 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 800;
        }
        .section-title p {
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }
        /* Trade Anywhere */
        .trade-anywhere {
            padding: 100px 0;
            background-color: white;
        }
        .trade-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }
        .trade-text {
            flex: 1;
        }
        .trade-text h2 {
            font-size: 3rem;
            margin-bottom: 25px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--black);
        }
        .trade-text p {
            font-size: 1.3rem;
            color: var(--gray-dark);
            margin-bottom: 40px;
            line-height: 1.7;
        }
        .platforms {
            margin-top: 40px;
        }
        .platforms h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--gray-dark);
            font-weight: 600;
        }
        .platform-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .badge-platform {
            background-color: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .badge-platform i {
            font-size: 1.2rem;
        }
        .app-download {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--light);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .qr-code {
            width: 200px;
            height: 200px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .app-download h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--black);
            text-align: center;
        }
        .app-download p {
            color: var(--gray);
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .store-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .store-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--black);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .store-btn:hover {
            background-color: var(--dark);
            transform: translateY(-2px);
            color: white;
        }
        .store-btn i {
            font-size: 1.5rem;
        }
        /* Features */
        .features {
            padding: 100px 0;
            background-color: white;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .feature-card {
            background-color: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        .feature-icon {
            font-size: 2.8rem;
            color: var(--primary);
            margin-bottom: 25px;
        }
        .feature-card h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--black);
        }
        /* Market Data */
        .market-data {
            padding: 100px 0;
            background-color: var(--light);
        }
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .market-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--black);
            margin: 0;
        }
        .market-table-wrap {
            overflow-x: auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .market-table-wrap table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }
        .market-table-wrap th,
        .market-table-wrap td {
            padding: 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .market-table-wrap th {
            background-color: #f9fafb;
            font-weight: 700;
            color: var(--gray-dark);
            font-size: 1rem;
        }
        .coin-info {
            display: flex;
            align-items: center;
        }
        .coin-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .price-up {
            color: var(--success);
            font-weight: 600;
        }
        .price-down {
            color: var(--danger);
            font-weight: 600;
        }
        /* Support */
        .support-section {
            padding: 100px 0;
            background-color: white;
        }
        .support-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
        }
        .support-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .support-card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .support-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .support-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .support-card h3 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            color: var(--black);
        }
        .support-info {
            background-color: var(--light);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .community-channels {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .community-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            text-decoration: none;
            color: var(--dark);
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .community-link:hover {
            background-color: rgba(30, 64, 175, 0.05);
            border-color: var(--primary-light);
            color: var(--dark);
        }
        .community-link i {
            font-size: 1.8rem;
            color: var(--primary);
        }
        .community-link h4 {
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        .community-link p {
            color: var(--gray);
            font-size: 0.9rem;
            margin: 0;
        }
        .support-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-item h4 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 700;
        }
        .stat-item p {
            color: var(--gray);
            font-size: 0.9rem;
            margin: 0;
        }
        /* FAQ */
        .faq {
            padding: 100px 0;
            background-color: white;
        }
        .faq-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .faq-item {
            background-color: white;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .faq-question {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--black);
            user-select: none;
        }
        .faq-question:hover {
            background-color: rgba(30, 64, 175, 0.03);
        }
        .faq-question i {
            color: var(--primary);
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        .faq-question.open i {
            transform: rotate(45deg);
        }
        .faq-answer {
            padding: 0 30px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            color: var(--gray-dark);
            line-height: 1.7;
        }
        .faq-answer.open {
            padding: 0 30px 30px 30px;
            max-height: 500px;
        }
        /* CTA */
        .cta {
            padding: 100px 0;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark) 100%);
            color: white;
            text-align: center;
        }
        .cta h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 800;
        }
        .cta p {
            max-width: 600px;
            margin: 0 auto 40px;
            opacity: 0.9;
            font-size: 1.2rem;
        }
        .btn-light {
            background-color: white;
            color: var(--black);
            font-weight: 700;
            padding: 15px 35px;
            font-size: 1.1rem;
        }
        .btn-light:hover {
            background-color: #f0f0f0;
        }
        /* Footer */
        footer {
            background-color: var(--black);
            color: white;
            padding: 80px 0 30px;
        }
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 50px;
            margin-bottom: 50px;
        }
        .footer-column h3 {
            margin-bottom: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
        }
        .footer-column ul {
            list-style: none;
            padding: 0;
        }
        .footer-column ul li {
            margin-bottom: 12px;
        }
        .footer-column ul li a {
            color: #d1d5db;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }
        .footer-column ul li a:hover {
            color: white;
        }
        .copyright {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #374151;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        /* Responsive */
        @media (max-width: 992px) {
            .hero-content,
            .trade-content {
                flex-direction: column;
            }
            .hero-text,
            .trade-text {
                text-align: center;
                margin-bottom: 50px;
            }
            .hero h1 {
                font-size: 2.8rem;
            }
            .trade-text h2 {
                font-size: 2.5rem;
            }
            .support-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                padding: 20px 0;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                margin: 15px 0;
            }
            .nav-links li {
                margin: 0 10px 10px;
            }
            .header-buttons {
                margin-top: 10px;
            }
            .hero h1 {
                font-size: 2.3rem;
            }
            .section-title h2 {
                font-size: 2.2rem;
            }
            .support-options {
                grid-template-columns: 1fr;
            }
            .support-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .market-table-wrap th,
            .market-table-wrap td {
                padding: 15px 10px;
                font-size: 0.9rem;
            }
        }
        @media (max-width: 480px) {
            .support-stats {
                grid-template-columns: 1fr;
            }
            .store-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
        /* Dashboard card in hero */
        .dashboard-card {
            background-color: rgba(30, 64, 175, 0.1);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .price-list {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .price-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .btn-sm {
            padding: 8px 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ──────────────────────────────────────
        // CUSTOM HOOK: Scroll-triggered fade-in
        // ──────────────────────────────────────
        function useScrollFadeIn() {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setVisible(true);
                            observer.unobserve(el);
                        }
                    }, { threshold: 0.1 }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            return [ref, visible];
        }

        // ──────────────────────────────────────
        // CUSTOM HOOK: Simulated market data
        // ──────────────────────────────────────
        function useMarketData() {
            const initialData = [
                { id: 1, name: 'Bitcoin', symbol: 'BTC', price: 63420.50, change: 3.2, volume: '32.4B',
                    marketCap: '1.24T', color: '#f7931a', letter: 'B' },
                { id: 2, name: 'Ethereum', symbol: 'ETH', price: 3245.80, change: 1.8, volume: '18.7B',
                    marketCap: '389.2B', color: '#627eea', letter: 'E' },
                { id: 3, name: 'Solana', symbol: 'SOL', price: 142.65, change: -2.1, volume: '3.2B',
                    marketCap: '62.4B', color: '#00d395', letter: 'S' },
                { id: 4, name: 'XRP', symbol: 'XRP', price: 0.52, change: 0.5, volume: '1.8B',
                    marketCap: '28.5B', color: '#000000', letter: 'X' },
                { id: 5, name: 'BNB', symbol: 'BNB', price: 585.30, change: -1.2, volume: '2.1B',
                    marketCap: '89.7B', color: '#f0b90b', letter: 'B' },
            ];

            const [data, setData] = useState(initialData);

            useEffect(() => {
                const interval = setInterval(() => {
                    setData(prev =>
                        prev.map(coin => {
                            const randomChange = (Math.random() - 0.5) * 0.5;
                            const newChange = coin.change + randomChange;
                            const newPrice = coin.price * (1 + randomChange / 100);
                            return {
                                ...coin,
                                price: parseFloat(newPrice.toFixed(2)),
                                change: parseFloat(newChange.toFixed(2)),
                            };
                        })
                    );
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            return data;
        }

        // ──────────────────────────────────────
        // COMPONENT: FadeInWrapper
        // ──────────────────────────────────────
        function FadeInWrapper({ children, className = '', delayClass = '' }) {
            const [ref, visible] = useScrollFadeIn();
            return (
                <div ref={ref} className={`fade-in ${visible ? 'visible' : ''} ${className} ${delayClass}`}>
                    {children}
                </div>
            );
        }

        // ──────────────────────────────────────
        // COMPONENT: Header
        // ──────────────────────────────────────
        function Header() {
            const handleNavClick = (e, targetId) => {
                e.preventDefault();
                const el = document.getElementById(targetId);
                if (el) {
                    window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
                }
            };

            const handleAction = (action) => {
                if (action === 'login') alert('Redirecting to login page...');
                if (action === 'register') alert('Redirecting to registration page...');
            };

            return (
                <header className="app-header">
                    <div className="container">
                        <div className="header-content">

        function MarketData() {
            const marketData = useMarketData();

            const formatPrice = (price) => {
                if (price >= 1) return '$ ' + price.toLocaleString('en-US', { minimumFractionDigits: 2,
                    maximumFractionDigits: 2 });
                return '$ ' + price.toFixed(4);
            };

            return (
                <section className="market-data" id="market">
                    <div className="container">
                        <div className="market-header">
                            <h2>Real-Time Quotes</h2>
                            <div>

                            </div>

                                    <tr>
                                        <th>Asset</th>
                                        <th>Price</th>
                                        <th>Change (24h)</th>
                                        <th>Volume (24h)</th>
                                        <th>Market Cap</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {marketData.map(coin => (
                                        <tr key={coin.id}>
                                            <td>
                                                <div className="coin-info">
                                                    <div className="coin-icon" style={{ backgroundColor: coin.color,
                    color: 'white' }}>
                                                        {coin.letter}
                                                    </div>
                                                    <div>
                                                        <div>{coin.name}</div>
                                                        <div style={{ fontSize: '0.9rem', color: 'var(--gray)' }}>{coin.symbol}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td>{formatPrice(coin.price)}</td>
                                            <td className={coin.change >= 0 ? 'price-up' : 'price-down'}>
                                                {coin.change >= 0 ? '+' : ''}{coin.change.toFixed(2)}%
                                            </td>
                                            <td>$ {coin.volume}</td>
                                            <td>$ {coin.marketCap}</td>
                                            <td>
                                                <button className="btn btn-primary btn-sm">Buy</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            );
        }
