<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPro - Cryptocurrency Platform (React + Security)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --black: #000000;
            --dark: #111827;
            --gray-dark: #374151;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --light: #f9fafb;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .app-header {
            background-color: var(--black);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }
        .logo {
            display: flex;
            align-items: center;
            font-weight: 800;
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
        }
        .logo i { margin-right: 10px; color: var(--primary-light); }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links li { margin-left: 30px; }
        .nav-links li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: color 0.3s;
            opacity: 0.9;
            cursor: pointer;
        }
        .nav-links li a:hover { color: var(--primary-light); opacity: 1; }
        .header-buttons { display: flex; gap: 15px; }
        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.95rem;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-outline:hover { background-color: rgba(255,255,255,0.1); border-color: white; }
        .btn-outline-dark { color: var(--black); border: 1px solid var(--gray); background: transparent; }
        .btn-outline-dark:hover { background-color: rgba(0,0,0,0.05); border-color: var(--dark); }
        .hero {
            padding: 100px 0;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(30,64,175,0.1));
        }
        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }
        .hero-text { flex: 1; max-width: 600px; }
        .hero-image { flex: 1; display: flex; justify-content: flex-end; }
        .hero h1 { font-size: 3.2rem; margin-bottom: 20px; line-height: 1.2; font-weight: 800; }
        .hero .subtitle { font-size: 1.2rem; color: var(--gray-light); margin-bottom: 30px; opacity: 0.9; }
        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }
        .section-title h2 { font-size: 2.8rem; margin-bottom: 15px; font-weight: 800; }
        .section-title p { color: var(--gray); max-width: 600px; margin: 0 auto; font-size: 1.1rem; }
        .trade-anywhere { padding: 100px 0; background: white; }
        .trade-content { display: flex; align-items: center; justify-content: space-between; gap: 60px; }
        .trade-text { flex: 1; }
        .trade-text h2 { font-size: 3rem; margin-bottom: 25px; font-weight: 800; color: var(--black); }
        .trade-text p { font-size: 1.3rem; color: var(--gray-dark); margin-bottom: 40px; }
        .platforms { margin-top: 40px; }
        .platforms h3 { font-size: 1.2rem; margin-bottom: 20px; color: var(--gray-dark); font-weight: 600; }
        .platform-badges { display: flex; flex-wrap: wrap; gap: 15px; }
        .badge-platform {
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .app-download {
            flex: 1;
            background: var(--light);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            text-align: center;
        }
        .qr-code {
            width: 200px; height: 200px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .store-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .store-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--black);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .store-btn:hover { background: var(--dark); transform: translateY(-2px); color: white; }
        .store-btn i { font-size: 1.5rem; }
        .features { padding: 100px 0; background: white; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .feature-card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .feature-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); border-color: var(--primary-light); }
        .feature-icon { font-size: 2.8rem; color: var(--primary); margin-bottom: 25px; }
        .feature-card h3 { margin-bottom: 15px; font-size: 1.5rem; font-weight: 700; }
        .market-data { padding: 100px 0; background: var(--light); }
        .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 15px; }
        .market-header h2 { font-size: 2.5rem; font-weight: 800; }
        .market-table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f9fafb; font-weight: 700; color: var(--gray-dark); }
        .coin-info { display: flex; align-items: center; }
        .coin-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .price-up { color: var(--success); font-weight: 600; }
        .price-down { color: var(--danger); font-weight: 600; }
        .support-section { padding: 100px 0; background: white; }
        .support-content { display: grid; grid-template-columns: 2fr 1fr; gap: 50px; }
        .support-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .support-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .support-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .support-icon { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; }
        .support-card h3 { margin-bottom: 15px; font-size: 1.4rem; color: var(--black); }
        .support-info { background: var(--light); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        .community-channels { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .community-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            text-decoration: none;
            color: var(--dark);
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .community-link:hover { background: rgba(30,64,175,0.05); border-color: var(--primary-light); color: var(--dark); }
        .community-link i { font-size: 1.8rem; color: var(--primary); }
        .community-link h4 { margin-bottom: 5px; font-size: 1.1rem; }
        .community-link p { color: var(--gray); font-size: 0.9rem; margin: 0; }
        .support-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .stat-item {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-item h4 { font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; font-weight: 700; }
        .stat-item p { color: var(--gray); font-size: 0.9rem; margin: 0; }
        .faq { padding: 100px 0; background: white; }
        .faq-container { max-width: 800px; margin: 0 auto; }
        .faq-item {
            background: white;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .faq-question {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--black);
            user-select: none;
        }
        .faq-question:hover { background: rgba(30,64,175,0.03); }
        .faq-question i { color: var(--primary); font-size: 1.5rem; transition: transform 0.3s; }
        .faq-question.open i { transform: rotate(45deg); }
        .faq-answer {
            padding: 0 30px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            color: var(--gray-dark);
            line-height: 1.7;
        }
        .faq-answer.open { padding: 0 30px 30px; max-height: 500px; }
        .cta {
            padding: 100px 0;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark) 100%);
            color: white;
            text-align: center;
        }
        .cta h2 { font-size: 3rem; margin-bottom: 20px; font-weight: 800; }
        .cta p { max-width: 600px; margin: 0 auto 40px; opacity: 0.9; font-size: 1.2rem; }
        .btn-light { background: white; color: var(--black); font-weight: 700; padding: 15px 35px; font-size: 1.1rem; }
        .btn-light:hover { background: #f0f0f0; }
        footer { background: var(--black); color: white; padding: 80px 0 30px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 50px; margin-bottom: 50px; }
        .footer-column h3 { margin-bottom: 25px; font-size: 1.3rem; font-weight: 700; }
        .footer-column ul { list-style: none; padding: 0; }
        .footer-column ul li { margin-bottom: 12px; }
        .footer-column ul li a { color: #d1d5db; text-decoration: none; transition: color 0.3s; cursor: pointer; }
        .footer-column ul li a:hover { color: white; }
        .copyright { text-align: center; padding-top: 30px; border-top: 1px solid #374151; color: #9ca3af; font-size: 0.9rem; }
        /* Security Demo Section */
        .security-demo { padding: 100px 0; background: var(--light); }
        .demo-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .demo-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .demo-card h3 { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .demo-card input, .demo-card textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; }
        .demo-card button { margin-top: 10px; }
        .output-box { background: #f3f4f6; padding: 15px; border-radius: 6px; margin: 15px 0; word-break: break-all; font-size: 0.9rem; }
        .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .btn-sm { padding: 8px 15px; font-size: 0.85rem; }
        @media (max-width: 992px) {
            .hero-content, .trade-content { flex-direction: column; }
            .hero-text, .trade-text { text-align: center; margin-bottom: 50px; }
            .hero h1 { font-size: 2.8rem; }
            .trade-text h2 { font-size: 2.5rem; }
            .support-content { grid-template-columns: 1fr; gap: 40px; }
            .demo-container { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; padding: 20px 0; }
            .nav-links { flex-wrap: wrap; justify-content: center; margin: 15px 0; }
            .nav-links li { margin: 0 10px 10px; }
            .header-buttons { margin-top: 10px; }
            .hero h1 { font-size: 2.3rem; }
            .section-title h2 { font-size: 2.2rem; }
            .support-options { grid-template-columns: 1fr; }
            .support-stats { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 15px 10px; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .support-stats { grid-template-columns: 1fr; }
            .store-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─────────── custom hooks ───────────
        function useScrollFadeIn() {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setVisible(true); observer.unobserve(el); }
                }, { threshold: 0.1 });
                observer.observe(el);
                return () => observer.disconnect();
            }, []);
            return [ref, visible];
        }

        function useMarketData() {
            const initialData = [
                { id:1, name:'Bitcoin', symbol:'BTC', price:63420.50, change:3.2, volume:'32.4B', marketCap:'1.24T', color:'#f7931a', letter:'B' },
                { id:2, name:'Ethereum', symbol:'ETH', price:3245.80, change:1.8, volume:'18.7B', marketCap:'389.2B', color:'#627eea', letter:'E' },
                { id:3, name:'Solana', symbol:'SOL', price:142.65, change:-2.1, volume:'3.2B', marketCap:'62.4B', color:'#00d395', letter:'S' },
                { id:4, name:'XRP', symbol:'XRP', price:0.52, change:0.5, volume:'1.8B', marketCap:'28.5B', color:'#000000', letter:'X' },
                { id:5, name:'BNB', symbol:'BNB', price:585.30, change:-1.2, volume:'2.1B', marketCap:'89.7B', color:'#f0b90b', letter:'B' },
            ];
            const [data, setData] = useState(initialData);
            useEffect(() => {
                const interval = setInterval(() => {
                    setData(prev => prev.map(coin => {
                        const randomChange = (Math.random() - 0.5) * 0.5;
                        const newChange = coin.change + randomChange;
                        const newPrice = coin.price * (1 + randomChange / 100);
                        return { ...coin, price: parseFloat(newPrice.toFixed(2)), change: parseFloat(newChange.toFixed(2)) };
                    }));
                }, 5000);
                return () => clearInterval(interval);
            }, []);
            return data;
        }

        // ─────────── components ───────────
        function FadeInWrapper({ children, className = '', delayClass = '' }) {
            const [ref, visible] = useScrollFadeIn();
            return (
                <div ref={ref} className={`fade-in ${visible ? 'visible' : ''} ${className} ${delayClass}`}>
                    {children}
                </div>
            );
        }

        function Header() {
            const handleNavClick = (e, targetId) => {
                e.preventDefault();
                const el = document.getElementById(targetId);
                if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
            };
            return (
                <header className="app-header">
                    <div className="container">
                        <div className="header-content">
                            <div className="logo" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                <i className="fas fa-coins"></i> CryptoPro
                            </div>
                            <nav>
                                <ul className="nav-links">
                                    <li><a href="#home" onClick={(e) => handleNavClick(e, 'home')}>Home</a></li>
                                    <li><a href="#trade" onClick={(e) => handleNavClick(e, 'trade')}>Trade</a></li>
                                    <li><a href="#market" onClick={(e) => handleNavClick(e, 'market')}>Market</a></li>
                                    <li><a href="#app" onClick={(e) => handleNavClick(e, 'app')}>App</a></li>
                                    <li><a href="#security" onClick={(e) => handleNavClick(e, 'security')}>Security</a></li>
                                    <li><a href="#faq" onClick={(e) => handleNavClick(e, 'faq')}>FAQ</a></li>
                                    <li><a href="#support" onClick={(e) => handleNavClick(e, 'support')}>Support</a></li>
                                </ul>
                            </nav>
                            <div className="header-buttons">
                                <button className="btn btn-outline" onClick={() => alert('Login')}>Login</button>
                                <button className="btn btn-primary" onClick={() => alert('Create Account')}>Create Account</button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        function Hero() {
            return (
                <section className="hero" id="home">
                    <div className="container">
                        <div className="hero-content">
                            <FadeInWrapper className="hero-text">
                                <h1>Invest in the future of finance with cryptocurrencies</h1>
                                <p className="subtitle">The most secure and advanced platform to buy, sell and trade Bitcoin, Ethereum and over 200 cryptocurrencies with the lowest fees in the market.</p>
                                <div style={{ display: 'flex', gap: '15px', flexWrap: 'wrap' }}>
                                    <button className="btn btn-primary" style={{ padding: '15px 30px', fontSize: '1.1rem' }}>Start Now</button>
                                    <button className="btn btn-outline" style={{ padding: '15px 30px', fontSize: '1.1rem' }}>View Demo</button>
                                </div>
                            </FadeInWrapper>
                            <FadeInWrapper className="hero-image" delayClass="delay-1">
                                <div className="dashboard-card" style={{ background:'rgba(30,64,175,0.1)', padding:25, borderRadius:12, border:'1px solid rgba(255,255,255,0.1)' }}>
                                    <div className="balance-row" style={{ display:'flex', justifyContent:'space-between', background:'rgba(0,0,0,0.3)', padding:25, borderRadius:8, marginBottom:15, backdropFilter:'blur(10px)' }}>
                                        <div><div style={{ fontSize:'0.9rem', color:'var(--gray-light)' }}>Total Balance</div><div style={{ fontSize:'2rem', fontWeight:700 }}>$ 58,421.75</div></div>
                                        <div style={{ textAlign:'right' }}><div style={{ fontSize:'0.9rem', color:'var(--success)' }}>+ 15.3%</div><div style={{ fontSize:'0.9rem', color:'var(--gray-light)' }}>this month</div></div>
                                    </div>
                                    <div className="price-list" style={{ background:'rgba(0,0,0,0.3)', padding:20, borderRadius:8, fontSize:'0.9rem', backdropFilter:'blur(10px)' }}>
                                        <div className="price-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:12, paddingBottom:12, borderBottom:'1px solid rgba(255,255,255,0.1)' }}><span>BTC/USDT</span><span style={{ color:'var(--success)' }}>$ 65,280.50 ↗</span></div>
                                        <div className="price-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:12, paddingBottom:12, borderBottom:'1px solid rgba(255,255,255,0.1)' }}><span>ETH/USDT</span><span style={{ color:'var(--success)' }}>$ 3,521.30 ↗</span></div>
                                        <div className="price-row" style={{ display:'flex', justifyContent:'space-between' }}><span>SOL/USDT</span><span style={{ color:'var(--danger)' }}>$ 138.42 ↘</span></div>
                                    </div>
                                </div>
                            </FadeInWrapper>
                        </div>
                    </div>
                </section>
            );
        }

        function TradeAnywhere() {
            return (
                <section className="trade-anywhere" id="app">
                    <div className="container">
                        <div className="trade-content">
                            <FadeInWrapper className="trade-text">
                                <h2>Trade from anywhere.</h2>
                                <p>Anywhere, anytime. Access the global cryptocurrency market through our mobile app or desktop platform.</p>
                                <div className="platforms">
                                    <h3>Also available for:</h3>
                                    <div className="platform-badges">
                                        <div className="badge-platform"><i className="fab fa-apple"></i> MacOS</div>
                                        <div className="badge-platform"><i className="fab fa-windows"></i> Windows</div>
                                        <div className="badge-platform"><i className="fab fa-linux"></i> Linux</div>
                                    </div>
                                </div>
                            </FadeInWrapper>
                            <FadeInWrapper className="app-download" delayClass="delay-1">
                                <div className="qr-code">
                                    <div style={{ textAlign:'center' }}>
                                        <div style={{ width:160, height:160, background:'var(--black)', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:5, flexDirection:'column' }}>
                                            <div style={{ color:'white', fontWeight:'bold', fontSize:'1.2rem', marginBottom:10 }}>CRYPTOPRO</div>
                                            <div style={{ fontSize:'0.9rem', color:'var(--primary-light)' }}>SCAN ME</div>
                                        </div>
                                    </div>
                                </div>
                                <h3>Scan to download the App</h3>

        // ─────────── NEW: Security Demo (E2EE + ZKP) ───────────
        function SecurityDemo() {
            // E2EE state
            const [e2eeMsg, setE2eeMsg] = useState('Hello, this is a secret trade order.');
            const [publicKey, setPublicKey] = useState(null);
            const [privateKey, setPrivateKey] = useState(null);
            const [encrypted, setEncrypted] = useState('');
            const [decrypted, setDecrypted] = useState('');

            const generateKeys = async () => {
                const keyPair = await window.crypto.subtle.generateKey(
                    { name: 'RSA-OAEP', modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' },
                    true,
                    ['encrypt', 'decrypt']
                );
                setPublicKey(keyPair.publicKey);
                setPrivateKey(keyPair.privateKey);
                const exportedPublic = await window.crypto.subtle.exportKey('spki', keyPair.publicKey);
                setPublicKey(btoa(String.fromCharCode(...new Uint8Array(exportedPublic))));
            };

            const encryptMessage = async () => {
                if (!publicKey || typeof publicKey !== 'object') return alert('Generate keys first!');
                const encoded = new TextEncoder().encode(e2eeMsg);
                const cipher = await window.crypto.subtle.encrypt({ name: 'RSA-OAEP' }, publicKey, encoded);
                setEncrypted(btoa(String.fromCharCode(...new Uint8Array(cipher))));
                setDecrypted('');
            };

            const decryptMessage = async () => {
                if (!privateKey) return;
                const raw = Uint8Array.from(atob(encrypted), c => c.charCodeAt(0));
                const plain = await window.crypto.subtle.decrypt({ name: 'RSA-OAEP' }, privateKey, raw);
                setDecrypted(new TextDecoder().decode(plain));
            };

            // ZKP simulation state
            const [secretValue, setSecretValue] = useState(25);
            const [threshold, setThreshold] = useState(18);
            const [proof, setProof] = useState('');
            const [zkpResult, setZkpResult] = useState('');

            const generateZKProof = () => {
                const val = parseInt(secretValue, 10);
                const thr = parseInt(threshold, 10);
                if (isNaN(val) || isNaN(thr)) return;
                const commitment = btoa(val.toString()); // simple hash substitute
                const fakeProof = btoa(`${val}:${thr}:${Date.now()}`);
                setProof(fakeProof);
                const isValid = val >= thr;
                setZkpResult(isValid ? '✅ Proof verified! Secret value meets threshold (without revealing the actual value).' : '❌ Proof failed. Value below threshold.');
            };

            return (
                <section className="security-demo" id="security">
                    <div className="container">
                        <div className="section-title">
                            <h2>🔐 Privacy & Security</h2>
                            <p>Experience how cutting‑edge encryption protects your data</p>
                        </div>
                        <div className="demo-container">
                            {/* E2EE Card */}
                            <FadeInWrapper className="demo-card">
                                <h3><i className="fas fa-lock"></i> End‑to‑End Encryption (E2EE)</h3>
                                <p style={{ fontSize:'0.9rem', color:'var(--gray)' }}>Only you can read your messages. Keys never leave your device.</p>
                                <button className="btn btn-primary" onClick={generateKeys} style={{ marginBottom:15 }}>
                                    <i className="fas fa-key"></i> Generate Key Pair (RSA‑OAEP 2048)
                                </button>
                                <textarea rows="3" value={e2eeMsg} onChange={e => setE2eeMsg(e.target.value)} placeholder="Type a secret message..."></textarea>
                                <button className="btn btn-primary" onClick={encryptMessage} style={{ marginRight:10 }}>Encrypt</button>
                                <button className="btn btn-outline-dark" onClick={decryptMessage} disabled={!encrypted}>Decrypt</button>
                                {encrypted && <div className="output-box"><strong>Encrypted (ciphertext):</strong><br/>{encrypted.substring(0, 100)}...</div>}
                                {decrypted && <div className="output-box"><strong>Decrypted:</strong> {decrypted}</div>}
                            </FadeInWrapper>

                            {/* ZKP Card */}
                            <FadeInWrapper className="demo-card" delayClass="delay-1">
                                <h3><i className="fas fa-eye-slash"></i> Zero‑Knowledge Proof (Simulation)</h3>
                                <p style={{ fontSize:'0.9rem', color:'var(--gray)' }}>Prove you meet a condition without revealing your secret.</p>
                                <label>Your secret value (e.g., age, balance):</label>
                                <input type="number" value={secretValue} onChange={e => setSecretValue(e.target.value)} />
                                <label>Threshold to prove (≥):</label>
                                <input type="number" value={threshold} onChange={e => setThreshold(e.target.value)} />
                                <button className="btn btn-primary" onClick={generateZKProof}>Generate Proof & Verify</button>
                                {proof && <div className="output-box"><strong>Proof (public):</strong><br/>{proof.substring(0, 60)}...</div>}
                                {zkpResult && <div className={`output-box ${zkpResult.includes('✅') ? 'text-success' : 'text-danger'}`}>{zkpResult}</div>}
                            </FadeInWrapper>
                        </div>
                    </div>
                </section>
            );
        }
