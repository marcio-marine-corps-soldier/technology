<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWings - Your Flight Booking Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #0d47a1;
            --accent: #ff6d00;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #202124;
            background-color: #f5f7fa;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary) !important;
        }
        .navbar-brand i {
            color: var(--accent);
            margin-right: 8px;
        }
        .nav-link { font-weight: 600; }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background-color: var(--secondary);
            border-color: var(--secondary);
        }
        .btn-accent {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .btn-accent:hover {
            background-color: #e65100;
            border-color: #e65100;
            color: white;
        }
        .hero {
            background: linear-gradient(rgba(26, 115, 232, 0.9), rgba(13, 71, 161, 0.9)),
                url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover;
            color: white;
            padding-top: 120px;
            padding-bottom: 80px;
            margin-top: 56px;
        }
        .hero h1 { font-weight: 800; font-size: 3rem; }
        .section-title {
            position: relative;
            margin-bottom: 50px;
            font-weight: 800;
        }
        .section-title:after {
            content: '';
            position: absolute;
            width: 80px;
            height: 4px;
            background-color: var(--accent);
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .search-container {
            margin-top: -60px;
            position: relative;
            z-index: 10;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .service-card {
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .service-icon {
            width: 70px;
            height: 70px;
            background-color: rgba(26, 115, 232, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
            margin: 0 auto 20px;
        }
        .destination-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .destination-card img { transition: transform 0.5s; }
        .destination-card:hover img { transform: scale(1.05); }
        .destination-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 20px;
        }
        .price-tag {
            background-color: var(--accent);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }
        .app-badges .badge {
            background-color: #202124;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: background 0.3s;
        }
        .app-badges .badge:hover { background-color: var(--primary); }
        footer { background-color: #202124; color: white; }
        footer a { color: #b0b0b0; text-decoration: none; }
        footer a:hover { color: white; }
        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #333;
            color: white;
            border-radius: 50%;
            margin-right: 10px;
        }
        .social-icons a:hover { background-color: var(--primary); color: white; }
        .footer-title:after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background-color: var(--accent);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        function Header() {
            const [isOpen, setIsOpen] = useState(false);
            const toggleMenu = () => setIsOpen(!isOpen);
            const closeMenu = () => setIsOpen(false);

            return (
                <nav className="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
                    <div className="container">
                        <a className="navbar-brand" href="#"><i className="fas fa-plane"></i> SkyWings</a>
                        <button className="navbar-toggler" type="button" onClick={toggleMenu}>
                            <span className="navbar-toggler-icon"></span>
                        </button>
                        <div className={`collapse navbar-collapse ${isOpen ? 'show' : ''}`}>
                            <ul className="navbar-nav ms-auto mb-2 mb-lg-0">
                                <li className="nav-item"><a className="nav-link" href="#home" onClick={closeMenu}>Home</a></li>
                                <li className="nav-item"><a className="nav-link" href="#services" onClick={closeMenu}>Services</a></li>
                                <li className="nav-item"><a className="nav-link" href="#destinations" onClick={closeMenu}>Destinations</a></li>
                                <li className="nav-item"><a className="nav-link" href="#app" onClick={closeMenu}>App</a></li>
                                <li className="nav-item"><a className="nav-link" href="#contact" onClick={closeMenu}>Contact</a></li>
                                <li className="nav-item"><a className="btn btn-primary ms-3" href="#" onClick={closeMenu}>My Account</a></li>
                            </ul>
                        </div>
                    </div>
                </nav>
            );
        }

        function Hero() {
            return (
                <section className="hero text-center" id="home">
                    <div className="container">
                        <h1>Flying all over the world</h1>
                        <p className="lead mb-4">Find the best flight tickets with the most competitive prices on the market. Over 500 airlines and thousands of destinations at your disposal.</p>
                        <a href="#search" className="btn btn-accent btn-lg">Search Flights</a>
                    </div>
                </section>
            );
        }

        function SearchForm() {
            const [origin, setOrigin] = useState('');
            const [destination, setDestination] = useState('');
            const [departure, setDeparture] = useState(new Date().toISOString().split('T')[0]);
            const [returnDate, setReturnDate] = useState(() => {
                const d = new Date();
                d.setDate(d.getDate() + 1);
                return d.toISOString().split('T')[0];
            });
            const [passengers, setPassengers] = useState('1');
            const [flightClass, setFlightClass] = useState('economy');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!origin.trim() || !destination.trim()) {
                    alert('Please fill in the origin and destination to search for flights.');
                    return;
                }
                alert(`Searching for flights from ${origin} to ${destination}...`);
            };

            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            return (
                <section id="search">
                    <div className="container">
                        <div className="search-container">
                            <h3 className="mb-4">Find your next trip</h3>
                            <form onSubmit={handleSubmit}>
                                <div className="row g-3">
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Origin</label>
                                        <input type="text" className="form-control" placeholder="City or airport of origin" value={origin} onChange={(e) => setOrigin(e.target.value)} />
                                    </div>
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Destination</label>
                                        <input type="text" className="form-control" placeholder="City or airport of destination" value={destination} onChange={(e) => setDestination(e.target.value)} />
                                    </div>
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Departure</label>
                                        <input type="date" className="form-control" min={today} value={departure} onChange={(e) => setDeparture(e.target.value)} />
                                    </div>
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Return</label>
                                        <input type="date" className="form-control" min={tomorrowStr} value={returnDate} onChange={(e) => setReturnDate(e.target.value)} />
                                    </div>
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Passengers</label>
                                        <select className="form-select" value={passengers} onChange={(e) => setPassengers(e.target.value)}>
                                            <option value="1">1 Passenger</option>
                                            <option value="2">2 Passengers</option>
                                            <option value="3">3 Passengers</option>
                                            <option value="4">4 Passengers</option>
                                            <option value="5+">5+ Passengers</option>
                                        </select>
                                    </div>
                                    <div className="col-md-4 col-sm-6">
                                        <label className="form-label fw-bold">Class</label>
                                        <select className="form-select" value={flightClass} onChange={(e) => setFlightClass(e.target.value)}>
                                            <option value="economy">Economy</option>
                                            <option value="premium">Premium Economy</option>
                                            <option value="business">Business</option>
                                            <option value="first">First Class</option>
                                        </select>
                                    </div>
                                    <div className="col-12">
                                        <button type="submit" className="btn btn-accent w-100 py-3 mt-2">
                                            <i className="fas fa-search me-2"></i> Search Flights
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            );
        }

        function Services() {
            const services = [
                { icon: "fa-search-dollar", title: "Best Prices", desc: "We guarantee the lowest prices on the market with our advanced search technology that compares hundreds of sites in real time." },
                { icon: "fa-headset", title: "24/7 Support", desc: "Our support team is available 24 hours a day, 7 days a week to help with any needs before, during or after your trip." },
                { icon: "fa-shield-alt", title: "Secure Purchase", desc: "We use state-of-the-art encryption to protect your data and offer refund guarantees in case of cancellation by airlines." },
                { icon: "fa-route", title: "Custom Itineraries", desc: "We create personalized travel itineraries with multiple destinations, accommodation and activities to make your experience unique." },
                { icon: "fa-plane-departure", title: "Flexible Bookings", desc: "Enjoy flexible booking options with easy changes, cancellations, and rebooking policies to accommodate your travel plans." },
                { icon: "fa-award", title: "Loyalty Program", desc: "Earn points on every booking and redeem them for discounts, upgrades, and exclusive travel experiences with our loyalty program." }
            ];

            return (
                <section id="services" className="py-5">
                    <div className="container">
                        <h2 className="text-center section-title">Our Services</h2>
                        <div className="row g-4 mt-4">
                            {services.map((s, i) => (
                                <div key={i} className="col-md-4 col-sm-6">
                                    <div className="card service-card h-100 text-center p-4">
                                        <div className="service-icon mx-auto"><i className={`fas ${s.icon}`}></i></div>
                                        <h4>{s.title}</h4>
                                        <p className="text-muted">{s.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        function Destinations() {
            const destinations = [
                { city: "Paris, France", desc: "The city of love and light", price: "$490", img: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
                { city: "New York, USA", desc: "The city that never sleeps", price: "$630", img: "https://images.unsplash.com/photo-1523531294919-4bcd7c65e216?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
                { city: "Tokyo, Japan", desc: "Tradition and modernity", price: "$970", img: "https://images.unsplash.com/photo-1536152470836-b943b246224c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
                { city: "Rio de Janeiro, Brazil", desc: "Wonderful city", price: "$136", img: "https://images.unsplash.com/photo-1483729558449-99ef09a8c325?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" }
            ];

            return (
                <section id="destinations" className="py-5 bg-light">
                    <div className="container">
                        <h2 className="text-center section-title">Popular Destinations</h2>
                        <div className="row g-4 mt-4">
                            {destinations.map((d, i) => (
                                <div key={i} className="col-md-6 col-lg-3">
                                    <div className="destination-card">
                                        <img src={d.img} alt={d.city} className="w-100" style={{ height: '300px', objectFit: 'cover' }} />
                                        <div className="destination-overlay">
                                            <h5 className="mb-1">{d.city}</h5>
                                            <small>{d.desc}</small>
                                            <span className="price-tag">From {d.price}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        function AppSection() {
            return (
                <section id="app" className="py-5">
                    <div className="container">
                        <div className="row align-items-center">
                            <div className="col-lg-6 mb-4 mb-lg-0">
                                <h2 className="mb-4">Download our app</h2>
                                <p>With the SkyWings app, you can search, compare and book flight tickets directly from your phone. Receive price alerts, check in online and access your tickets even offline.</p>
                                <p>Available for iOS and Android, our app has been rated as the best travel app for 3 consecutive years.</p>
                                <div className="app-badges d-flex gap-3 mt-4">
                                    <a href="#" className="badge"><i className="fab fa-apple me-2"></i> App Store</a>
                                    <a href="#" className="badge"><i className="fab fa-google-play me-2"></i> Google Play</a>
                                </div>
                            </div>
                            <div className="col-lg-6 text-center">
                                <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="SkyWings App" className="img-fluid rounded shadow" />
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function Footer() {
            return (
                <footer id="contact" className="pt-5 pb-3">
                    <div className="container">
                        <div className="row">
                            <div className="col-md-4 mb-4">
                                <h5 className="footer-title">SkyWings</h5>
                                <p className="small">Your complete platform for flight ticket purchases. We connect you to the best destinations with competitive prices and exceptional service.</p>
                                <div className="social-icons mt-3">
                                    <a href="#"><i className="fab fa-facebook-f"></i></a>
                                    <a href="#"><i className="fab fa-twitter"></i></a>
                                    <a href="#"><i className="fab fa-instagram"></i></a>
                                    <a href="#"><i className="fab fa-linkedin-in"></i></a>
                                </div>
                            </div>
                            <div className="col-md-2 mb-4">
                                <h5 className="footer-title">Quick Links</h5>
                                <ul className="list-unstyled">
                                    <li><a href="#home">Home</a></li>
                                    <li><a href="#services">Services</a></li>
                                    <li><a href="#destinations">Destinations</a></li>
                                    <li><a href="#app">App</a></li>
                                    <li><a href="#">About Us</a></li>
                                </ul>
                            </div>
                            <div className="col-md-2 mb-4">
                                <h5 className="footer-title">Support</h5>
                                <ul className="list-unstyled">
                                    <li><a href="#">Help Center</a></li>
                                    <li><a href="#">Cancellations</a></li>
                                    <li><a href="#">Refund Policy</a></li>
                                    <li><a href="#">Terms of Use</a></li>
                                    <li><a href="#">Privacy Policy</a></li>
                                </ul>
                            </div>
                            <div className="col-md-4 mb-4">
                                <h5 className="footer-title">Contact</h5>
                                <ul className="list-unstyled small">
                                    <li><i className="fas fa-map-marker-alt me-2"></i> City of Los Angeles, CA - US</li>
                                    <li><i className="fas fa-phone me-2"></i> +1 (212) 555-5555</li>
                                    <li><i className="fas fa-envelope me-2"></i> contact@skywings.com</li>
                                    <li><i className="fas fa-clock me-2"></i> Mon-Fri: 8am-8pm | Sat: 9am-4pm</li>
                                </ul>
                            </div>
                        </div>
                        <hr className="border-secondary" />
                        {/* CORRIGIDO: texto cinza claro #b0b0b0 */}
                        <p className="text-center small mb-0" style={{ color: '#b0b0b0' }}>&copy; 2026 SkyWings. All rights reserved.</p>
                    </div>
                </footer>
            );
        }

        function App() {
            return (
                <>
                    <Header />
                    <Hero />
                    <SearchForm />
                    <Services />
                    <Destinations />
                    <AppSection />
                    <Footer />
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
